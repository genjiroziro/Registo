<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>THE UCHIHA FAMILY | Esports Elite</title>
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: bold gaming style -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #FFD700;  /* yellow gold base */
            background-image: radial-gradient(circle at 10% 20%, rgba(0,0,0,0.08) 2%, transparent 2.5%),
                              radial-gradient(circle at 85% 70%, rgba(180, 0, 0, 0.1) 1.8%, transparent 2%);
            background-size: 40px 40px, 35px 35px;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }

        /* overlay merah hitam tipis untuk vibe agresif */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(145deg, rgba(0,0,0,0.2) 0%, rgba(139,0,0,0.1) 100%);
            pointer-events: none;
            z-index: 0;
        }

        /* main container */
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(3px);
            border-radius: 3rem;
            border: 2px solid #FFD966;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 4px rgba(255, 215, 0, 0.3);
            padding: 2rem 1.5rem 1.5rem;
            z-index: 2;
            transition: all 0.3s ease;
        }

        /* Header gaya gaming */
        .gaming-header {
            text-align: center;
            margin-bottom: 1.8rem;
            border-bottom: 3px solid #FF3A3A;
            display: inline-block;
            width: 100%;
            padding-bottom: 0.8rem;
        }

        .gaming-header h1 {
            font-family: 'Orbitron', 'Rajdhani', monospace;
            font-weight: 900;
            font-size: clamp(1.8rem, 8vw, 3.5rem);
            letter-spacing: 3px;
            background: linear-gradient(135deg, #FFD966 0%, #FFD700 40%, #FFA500 80%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px #FF0000, 0 2px 4px black;
            word-break: break-word;
        }

        /* Logo area focus utama dengan efek modern */
        .logo-focus {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2rem 0;
            position: relative;
        }

        .logo-wrapper {
            position: relative;
            width: 280px;
            max-width: 80vw;
            transition: transform 0.25s ease;
        }

        .logo-img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.9) 100%);
            padding: 12px;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.8), 0 0 15px rgba(255, 0, 0, 0.5), 0 20px 30px rgba(0,0,0,0.4);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 3px solid #FFD700;
        }

        /* efek glow berdenyut modern ala esports */
        .logo-wrapper:hover .logo-img {
            transform: scale(1.02);
            box-shadow: 0 0 45px #FFD700, 0 0 25px #FF3A3A, 0 0 8px white;
            border-color: #FF3A3A;
        }

        /* untuk meniru logo sederhana: karena tidak ada file gambar, kita buat SVG dengan inspirasi warna merah-hitam-kuning + motif kipas/flame seperti Uchiha */
        .custom-logo-svg {
            width: 100%;
            height: auto;
            background: radial-gradient(ellipse at 30% 40%, #1a1a1a, #000000);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            box-sizing: border-box;
        }

        svg {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 0 12px #ffcc33);
        }

        /* main section text */
        .main-text {
            text-align: center;
            margin: 2rem 0 1.5rem;
        }

        .main-text h2 {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 800;
            color: #FFE484;
            text-shadow: 0 2px 5px #B22222;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #FFF2B5, #FFCC33);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: none;
        }

        .main-text h2 span {
            color: #FF3A3A;
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            text-shadow: 0 0 5px #ff0000;
        }

        .subtext {
            font-size: clamp(1rem, 4vw, 1.35rem);
            color: #F9F3D9;
            font-weight: 600;
            margin-top: 0.8rem;
            background: rgba(0,0,0,0.55);
            display: inline-block;
            padding: 0.5rem 1.5rem;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border-left: 5px solid #FF3A3A;
            border-right: 5px solid #FFD700;
        }

        /* tombol WhatsApp besar + ikon */
        .btn-wa-container {
            display: flex;
            justify-content: center;
            margin: 2rem 0 1rem;
        }

        .btn-wa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: #25D366;
            padding: 1rem 2.2rem;
            border-radius: 70px;
            text-decoration: none;
            font-family: 'Orbitron', 'Rajdhani', sans-serif;
            font-weight: bold;
            font-size: 1.4rem;
            letter-spacing: 1px;
            color: #111;
            background: linear-gradient(135deg, #25D366, #128C7E);
            box-shadow: 0 12px 20px rgba(0,0,0,0.3), 0 0 0 2px #FFD966 inset, 0 0 0 4px rgba(0,0,0,0.2) inset;
            transition: all 0.25s ease-in-out;
            border: none;
            cursor: pointer;
        }

        .btn-wa i {
            font-size: 2rem;
            color: white;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.3));
        }

        .btn-wa span {
            font-weight: 800;
            color: white;
            text-shadow: 0 1px 2px black;
        }

        /* efek hover: zoom & glow khas gaming */
        .btn-wa:hover {
            transform: scale(1.08);
            box-shadow: 0 0 28px #25D366, 0 0 15px #FFD700, 0 10px 20px black;
            background: linear-gradient(135deg, #34eb6e, #075E54);
            gap: 20px;
        }

        .btn-wa:active {
            transform: scale(0.98);
        }

        /* footer */
        footer {
            text-align: center;
            margin-top: 2.5rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 215, 0, 0.5);
            font-size: 0.8rem;
            color: #FFE4A3;
            font-weight: 600;
            letter-spacing: 1px;
        }

        /* efek tambahan: garis merah aksen */
        .accent-line {
            height: 4px;
            width: 120px;
            background: linear-gradient(90deg, #FFD700, #FF3A3A, #000);
            margin: 0.5rem auto;
            border-radius: 4px;
        }

        /* Responsive fine-tuning */
        @media (max-width: 640px) {
            .container {
                padding: 1.2rem 1rem;
            }
            .btn-wa {
                padding: 0.8rem 1.4rem;
                font-size: 1.1rem;
                gap: 12px;
            }
            .btn-wa i {
                font-size: 1.5rem;
            }
            .subtext {
                font-size: 0.9rem;
                padding: 0.4rem 1rem;
            }
        }

        /* animasi tambahan: skeleton loading tidak perlu, tapi glow logo lembut */
        @keyframes subtlePulse {
            0% { box-shadow: 0 0 5px #FFD700, 0 0 12px rgba(255,0,0,0.4);}
            100% { box-shadow: 0 0 20px #FFCC33, 0 0 28px rgba(255,50,50,0.6);}
        }
        .logo-wrapper {
            animation: subtlePulse 2s infinite alternate ease-in-out;
        }
        .logo-wrapper:hover {
            animation: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="gaming-header">
        <h1>THE UCHIHA FAMILY</h1>
        <div class="accent-line"></div>
    </div>

    <!-- logo focus utama: terinspirasi dari logo Uchiha (kipas, merah-hitam, kuning gold) -->
    <div class="logo-focus">
        <div class="logo-wrapper">
            <div class="custom-logo-svg">
                <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#2b0000" />
                            <stop offset="100%" stop-color="#000000" />
                        </radialGradient>
                        <linearGradient id="goldFire" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#FFD966" />
                            <stop offset="50%" stop-color="#FFB800" />
                            <stop offset="100%" stop-color="#FF3A3A" />
                        </linearGradient>
                        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
                            <feMerge>
                                <feMergeNode in="offsetblur" />
                                <feMergeNode in="SourceGraphic" />
                            </feMerge>
                        </filter>
                    </defs>
                    <!-- Lingkaran dasar hitam-merah -->
                    <circle cx="200" cy="200" r="180" fill="url(#bgGrad)" stroke="#FFD700" stroke-width="6" />
                    <!-- Kipas Uchiha style: tiga bilah dengan warna merah & emas -->
                    <g transform="translate(200,200)">
                        <!-- Bilah kipas 1 -->
                        <path d="M0,-20 L-40,-140 Q-30,-170 0,-180 Q30,-170 40,-140 L0,-20 Z" fill="#B71C1C" stroke="#FFD700" stroke-width="3" />
                        <!-- Bilah kipas 2 (rotasi) -->
                        <path d="M0,-20 L-140,-40 Q-170,-30 -180,0 Q-170,30 -140,40 L0,-20 Z" fill="#D32F2F" stroke="#FFD700" stroke-width="3" />
                        <!-- Bilah kipas 3 -->
                        <path d="M0,-20 L140,-40 Q170,-30 180,0 Q170,30 140,40 L0,-20 Z" fill="#B71C1C" stroke="#FFD700" stroke-width="3" />
                        <!-- Detail pusat (Sharingan abstrak) -->
                        <circle cx="0" cy="0" r="36" fill="#000000" stroke="#FFCC33" stroke-width="4" />
                        <circle cx="0" cy="0" r="18" fill="#FF3A3A" stroke="#FFD700" stroke-width="3" />
                        <!-- Tomoe kecil abstrak: 3 titik merah gold -->
                        <circle cx="0" cy="-12" r="6" fill="#FFD700" />
                        <circle cx="10.4" cy="6" r="6" fill="#FFD700" />
                        <circle cx="-10.4" cy="6" r="6" fill="#FFD700" />
                        <!-- garis energi -->
                        <path d="M-70,-70 L-40,-40 M70,-70 L40,-40 M-70,70 L-40,40 M70,70 L40,40" stroke="#FFC107" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
                    </g>
                    <!-- tulisan kecil "FAMILY" di lingkaran luar -->
                    <text x="200" y="355" font-family="'Orbitron', sans-serif" font-weight="bold" font-size="18" fill="#FFD700" text-anchor="middle" stroke="#000" stroke-width="0.5">FAMILY</text>
                </svg>
            </div>
        </div>
    </div>

    <!-- Main Section Join Squad -->
    <div class="main-text">
        <h2>Join Our Squad – <span>PUBG Mobile Team</span></h2>
        <div class="subtext">
            <i class="fas fa-fire" style="margin-right: 8px; color:#FF8C00;"></i> 
            Ita buka oportunidade ba player sira ne’ebé hakarak sai parte husi THE UCHIHA FAMILY
            <i class="fas fa-gamepad" style="margin-left: 8px;"></i>
        </div>
    </div>

    <!-- Tombol WA besar dengan ikon -->
    <div class="btn-wa-container">
        <a href="https://chat.whatsapp.com/KRsf8zAOqJp1EetHM2iBBZ?mode=gi_t" target="_blank" rel="noopener noreferrer" class="btn-wa">
            <i class="fab fa-whatsapp"></i>
            <span>Join WhatsApp Group</span>
            <i class="fas fa-chevron-right" style="font-size: 1.1rem;"></i>
        </a>
    </div>

    <footer>
        © THE UCHIHA FAMILY Esports
    </footer>
</div>

<!-- tambahan efek dinamis ringan supaya tombol bergetar halus? tidak perlu, tapi hover sudah modern -->
</body>
</html>
